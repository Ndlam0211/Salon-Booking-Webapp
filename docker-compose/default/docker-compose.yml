services:
  eureka-server:
    image: "lamnd0211/salonbooking-eureka-server:v1"
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent eureka-server:8070/actuator/health/readiness | grep UP || exist 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: eureka-server
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - lamnd

  gateway-server:
    image: "lamnd0211/salonbooking-gateway-server:v1"
    ports:
      - "8000:8000"
    healthcheck:
      test: "curl --fail --silent gateway-server:8000/actuator/health/readiness | grep UP || exist 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: gateway-server
    environment:
      SPRING_APPLICATION_NAME: gateway-server
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - lamnd

  user-service:
    image: "lamnd0211/salonbooking-user:v1"
    ports:
      - "8081:8081"
    healthcheck:
      test: "curl --fail --silent user-service:8081/actuator/health/readiness | grep UP || exist 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: user-service
    depends_on:
      userdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "user-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://userdb:3306/userdb"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - lamnd

  userdb:
    image: mysql
    container_name: userdb
    ports:
      - "3301:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: userdb
    networks:
      - lamnd

  booking-service:
