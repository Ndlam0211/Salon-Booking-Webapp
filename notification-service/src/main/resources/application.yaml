server:
  port: 8088

spring:
  application:
    name: notification-service
  datasource:
    url: ${DBMS_CONNECTION:jdbc:mysql://localhost:3306/notificationdb_salonbooking?createDatabaseIfNotExist=true}
    username: ${DBMS_USERNAME:root}
    password: ${DBMS_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: "http://localhost:8070/eureka/"
