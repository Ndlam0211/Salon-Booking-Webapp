server:
  port: 8000

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
          routes:
            - id: USER-SERVICE
              uri:
                "lb://USER-SERVICE"
              predicates:
                - Path= /auth/**, /api/v1/users/**, /api/admin/users/**, /users/**

            - id: BOOKING-SERVICE
              uri:
                "lb://BOOKING-SERVICE"
              predicates:
                - Path= /api/v1/bookings/**

            - id: CATEGORY-SERVICE
              uri:
                "lb://CATEGORY-SERVICE"
              predicates:
                - Path= /api/v1/categories/**

            - id: PAYMENT-SERVICE
              uri:
                "lb://PAYMENT-SERVICE"
              predicates:
                - Path= /api/v1/payments/**

            - id: SALON-SERVICE
              uri:
                "lb://SALON-SERVICE"
              predicates:
                - Path= /salons/**, /api/v1/salons/**, /api/admin/salons/**

            - id: SERVICE-OFFERING
              uri:
                "lb://SERVICE-OFFERING"
              predicates:
                - Path= /api/v1/service-offerings/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: "http://localhost:8070/eureka/"